name: Update FX rates

on:
  schedule:
    - cron: '0 22 * * *' # 07:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch rates
        run: python scripts/fetch_rates.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/rates.json; then
            echo "No rate changes, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rates.json
          git commit -m "data: 환율 자동 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
